<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <!-- معلومات PWA -->
    <title>مراجعة الفلسفة</title>
    <meta name="description" content="تطبيق لمراجعة المجزوءات الفلسفية الأربع">
    <meta name="theme-color" content="#7f8c8d">
    <link rel="manifest" href="manifest.json">
    
    <!-- أيقونات التطبيق للشاشة الرئيسية -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="فلسفة">
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- تأكد من عدم تخزين الملفات في الكاش القديم -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <i class="fas fa-scroll"></i>
            <h1>مراجعة الفلسفة</h1>
            <button class="home-btn" id="homeBtn">
                <i class="fas fa-home"></i>
            </button>
        </div>
        <div class="content-area" id="contentArea"></div>
    </div>
    
    <!-- تسجيل Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
    
    <!-- ملفات التطبيق -->
    <script src="script.js"></script>
</body>
</html>
